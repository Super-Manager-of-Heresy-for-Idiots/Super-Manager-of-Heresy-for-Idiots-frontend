name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

# Минимальные права по умолчанию. Deploy job отдельно повышает contents до write,
# потому что после успешного GitOps deploy коммитит bump версии обратно в app repo.
permissions:
  contents: read

env:
  REGISTRY: docker.io
  # Образ в Docker Hub: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}
  IMAGE_NAME: dnd-frontend
  # Имя образа внутри Kustomize (поле images[].name в GitOps-репо).
  KUSTOMIZE_IMAGE_NAME: dnd-frontend
  # Путь к kustomization.yaml в GitOps-репозитории, где лежит блок images:.
  # Блок images: лежит в оверлее prod, НЕ в base.
  GITOPS_KUSTOMIZATION_PATH: apps/dnd-frontend/overlays/prod/kustomization.yaml
  # Runtime release config, mounted into nginx by the GitOps frontend Deployment.
  GITOPS_APP_RELEASE_CONFIG_PATH: apps/dnd-frontend/base/app-release-config.yaml
  TELEGRAM_BOT_TOKEN: "8849859231:AAHAhGO5I2Pz-yL1Mf1nTGfHsqAhskJBoJg"
  TELEGRAM_CHAT_ID: "433993661"
  TELEGRAM_THREAD_ID: ""

jobs:
  # ---------------------------------------------------------------------------
  # 1. TEST — на любой ветке и на каждый pull_request
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests + coverage
        run: npm run test:coverage

      - name: Run version bump tests
        run: npm run test:version-bump

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 2. BUILD + 3. PUBLISH — только после успешного test и только на main
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${REGISTRY}/${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Сборка фронта происходит внутри multi-stage Dockerfile (node -> nginx).
      - name: Build and push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. PUBLISH — верификация, что образ реально доступен в реестре
      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.sha_tag }}"

  # ---------------------------------------------------------------------------
  # 4. DEPLOY — ручное подтверждение через environment: production
  #    (кнопка Review deployments в GitHub UI при настроенных required reviewers)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (GitOps)
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    # Не допускаем параллельных деплоев; новые в очередь, текущий не прерываем.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      # Если GITOPS_REPO_SLUG пуст, actions/checkout молча выкачает ТЕКУЩИЙ
      # (app) репозиторий — отсюда "no such file" на GitOps kustomization path.
      - name: Validate GitOps repo slug
        run: |
          if [ -z "${{ vars.GITOPS_REPO_SLUG }}" ]; then
            echo "::error::Variable GITOPS_REPO_SLUG is empty. Set it to Super-Manager-of-Heresy-for-Idiots/dnd-gitops"
            exit 1
          fi

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: app

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bump runtime app version
        id: release
        working-directory: app
        run: |
          NEXT_VERSION="$(node scripts/bump-version.mjs public/app-release.json --print)"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Runtime app version bumped to ${NEXT_VERSION}"

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO_SLUG }}   # org/dnd-gitops; см. SECRETS.md
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update image tag in Kustomize
        working-directory: gitops
        env:
          NEW_TAG: ${{ github.sha }}
        run: |
          FILE="${GITOPS_KUSTOMIZATION_PATH}"
          if [ ! -f "${FILE}" ]; then
            echo "::error::${FILE} not found in GitOps repo ${{ vars.GITOPS_REPO_SLUG }}"
            exit 1
          fi
          echo "Updating ${KUSTOMIZE_IMAGE_NAME} -> tag ${NEW_TAG} in ${FILE}"
          # yq v4 предустановлен на ubuntu-latest
          IMG="${KUSTOMIZE_IMAGE_NAME}" TAG="${NEW_TAG}" \
            yq -i '(.images[] | select(.name == strenv(IMG))).newTag = strenv(TAG)' "${FILE}"
          echo "----- resulting images block -----"
          yq '.images' "${FILE}"

      - name: Update runtime release config in GitOps
        working-directory: gitops
        run: |
          FILE="${GITOPS_APP_RELEASE_CONFIG_PATH}"
          if [ ! -f "${FILE}" ]; then
            echo "::error::${FILE} not found in GitOps repo ${{ vars.GITOPS_REPO_SLUG }}"
            exit 1
          fi
          yq -i '.data["app-release.json"] = load_str("../app/public/app-release.json")' "${FILE}"
          echo "Runtime release config -> version ${{ steps.release.outputs.version }}"

      - name: Commit & push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_KUSTOMIZATION_PATH}" "${GITOPS_APP_RELEASE_CONFIG_PATH}"
          if git diff --cached --quiet; then
            echo "No changes — image tag and release config already up to date."
            exit 0
          fi
          git commit -m "chore: deploy frontend ${{ github.sha }} app v${{ steps.release.outputs.version }} [skip ci]"
          git push

      - name: Commit app version bump
        working-directory: app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/app-release.json
          if git diff --cached --quiet; then
            echo "No app release config changes."
            exit 0
          fi
          git commit -m "chore: bump app version to ${{ steps.release.outputs.version }} [skip ci]"
          git push

  notify-test-failure:
    name: Notify Telegram - Test failed
    needs: test
    if: ${{ always() && (needs.test.result == 'failure' || needs.test.result == 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send failure alert
        run: bash .github/scripts/send-telegram-alert.sh error
        env:
          STAGE_NAME: Test
          STAGE_RESULT: ${{ needs.test.result }}

  notify-build-failure:
    name: Notify Telegram - Build failed
    needs: build
    if: ${{ always() && (needs.build.result == 'failure' || needs.build.result == 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send failure alert
        run: bash .github/scripts/send-telegram-alert.sh error
        env:
          STAGE_NAME: "Build & Push image"
          STAGE_RESULT: ${{ needs.build.result }}

  notify-deploy-failure:
    name: Notify Telegram - Deploy failed
    needs: deploy
    if: ${{ always() && (needs.deploy.result == 'failure' || needs.deploy.result == 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send failure alert
        run: bash .github/scripts/send-telegram-alert.sh error
        env:
          STAGE_NAME: "Deploy (GitOps)"
          STAGE_RESULT: ${{ needs.deploy.result }}

  notify-deploy-success:
    name: Notify Telegram - Deploy succeeded
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send success alert
        run: bash .github/scripts/send-telegram-alert.sh success
        env:
          STAGE_NAME: "Deploy (GitOps)"
          STAGE_RESULT: ${{ needs.deploy.result }}
