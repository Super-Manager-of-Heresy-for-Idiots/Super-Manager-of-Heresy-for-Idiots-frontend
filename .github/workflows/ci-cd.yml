name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

# Минимально необходимые права. Деплой пишет во ВНЕШНИЙ GitOps-репозиторий
# через PAT (GITOPS_REPO_TOKEN), права на запись в текущий репо не нужны.
permissions:
  contents: read

env:
  REGISTRY: docker.io
  # Образ в Docker Hub: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}
  IMAGE_NAME: dnd-frontend
  # Имя образа внутри Kustomize (поле images[].name в GitOps-репо).
  KUSTOMIZE_IMAGE_NAME: dnd-frontend
  # Путь к kustomization.yaml в GitOps-репозитории, где лежит блок images:.
  GITOPS_KUSTOMIZATION_PATH: apps/dnd/base/kustomization.yaml

jobs:
  # ---------------------------------------------------------------------------
  # 1. TEST — на любой ветке и на каждый pull_request
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 2. BUILD + 3. PUBLISH — только после успешного test и только на main
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          IMAGE="${REGISTRY}/${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Сборка фронта происходит внутри multi-stage Dockerfile (node -> nginx).
      - name: Build and push (latest + sha)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. PUBLISH — верификация, что образ реально доступен в реестре
      - name: Verify pushed image
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.sha_tag }}"

  # ---------------------------------------------------------------------------
  # 4. DEPLOY — ручное подтверждение через environment: production
  #    (кнопка Review deployments в GitHub UI при настроенных required reviewers)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (GitOps)
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    # Не допускаем параллельных деплоев; новые в очередь, текущий не прерываем.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO_SLUG }}   # напр. cryingloli/dnd-gitops; см. SECRETS.md
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Update image tag in Kustomize
        working-directory: gitops
        env:
          NEW_TAG: ${{ github.sha }}
        run: |
          FILE="${GITOPS_KUSTOMIZATION_PATH}"
          echo "Updating ${KUSTOMIZE_IMAGE_NAME} -> tag ${NEW_TAG} in ${FILE}"
          # yq v4 предустановлен на ubuntu-latest
          IMG="${KUSTOMIZE_IMAGE_NAME}" TAG="${NEW_TAG}" \
            yq -i '(.images[] | select(.name == strenv(IMG))).newTag = strenv(TAG)' "${FILE}"
          echo "----- resulting images block -----"
          yq '.images' "${FILE}"

      - name: Commit & push to GitOps repo
        working-directory: gitops
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${GITOPS_KUSTOMIZATION_PATH}"
          if git diff --cached --quiet; then
            echo "No changes — image tag already up to date."
            exit 0
          fi
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
