server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve backend dynamically so nginx starts even without backend
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Browser security headers ────────────────────────────────────────────
    # Defined at server level so they ride API/WS responses and nginx-level error
    # pages (`always`). nginx DROPS inherited add_header in any location that sets
    # its own, so the same set is repeated in `location /` (which sets Cache-Control).
    # CSP keeps the XSS blast radius tight (the access token lives in JS memory for
    # the WS handshake). Google Fonts need explicit style-src/font-src entries;
    # 'self' on connect-src covers the same-origin /ws SockJS socket.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location /api/ {
        set $backend "http://backend:8080";
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / SockJS -> WS tier. Separate upstream from /api/.
    location /ws {
        set $ws "http://ws:8080";
        proxy_pass $ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived sockets must not be killed by idle timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Stream SockJS frames immediately, no buffering.
        proxy_buffering off;
    }

    # Content-hashed build assets — the filename changes on every build, so they
    # are safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA entry + client routes. The HTML must never be cached: after a redeploy
    # the asset hashes change, and a stale index.html would 404 on old chunk
    # filenames ("Failed to fetch dynamically imported module").
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        # Repeated from server level: this location sets its own add_header
        # (Cache-Control), which makes nginx ignore the inherited security headers.
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
