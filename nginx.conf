server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Resolve backend dynamically so nginx starts even without backend
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $backend "http://backend:8080";
        proxy_pass $backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / SockJS -> WS tier. Separate upstream from /api/.
    location /ws {
        set $ws "http://ws:8080";
        proxy_pass $ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived sockets must not be killed by idle timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Stream SockJS frames immediately, no buffering.
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
