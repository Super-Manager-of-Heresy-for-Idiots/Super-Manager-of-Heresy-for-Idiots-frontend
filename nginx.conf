log_format upstream_timing '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
    'request_id="$request_id" request_time="$request_time" '
    'upstream_addr="$upstream_addr" upstream_status="$upstream_status" '
    'upstream_connect_time="$upstream_connect_time" '
    'upstream_header_time="$upstream_header_time" '
    'upstream_response_time="$upstream_response_time"';

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log upstream_timing;
    error_log /var/log/nginx/error.log info;

    # Resolve backend dynamically so nginx starts even without backend
    resolver 127.0.0.11 valid=30s ipv6=off;

    location /api/ {
        set $backend "http://backend:8080";
        proxy_pass $backend;
        proxy_redirect ~^http://[^/]+/(.*) /$1;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Request-ID $request_id always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
