<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    
    <radialGradient id="stone" cx="42%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#221d1a"></stop>
      <stop offset="46%" stop-color="#14110f"></stop>
      <stop offset="100%" stop-color="#070504"></stop>
    </radialGradient>
    
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b89763"></stop>
      <stop offset="40%" stop-color="#8e7448"></stop>
      <stop offset="100%" stop-color="#4a3a24"></stop>
    </linearGradient>
    
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3c485"></stop>
      <stop offset="45%" stop-color="#c39a52"></stop>
      <stop offset="100%" stop-color="#8a6c39"></stop>
    </linearGradient>
    <radialGradient id="emberCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d49a"></stop>
      <stop offset="55%" stop-color="#c39a52"></stop>
      <stop offset="100%" stop-color="#6e5430"></stop>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#stone)"></rect>
  
  <rect x="0" y="0" width="512" height="512" rx="112" fill="none" stroke="#000" stroke-opacity="0.55" stroke-width="2"></rect>
  <rect x="14" y="14" width="484" height="484" rx="100" fill="none" stroke="#7a6340" stroke-opacity="0.28" stroke-width="2"></rect>

  <g transform="translate(256 256)">
    
    <circle r="184" fill="none" stroke="url(#bronze)" stroke-width="10" stroke-opacity="0.9"></circle>
    <circle r="184" fill="none" stroke="#000" stroke-opacity="0.4" stroke-width="2"></circle>
    <circle r="168" fill="none" stroke="#7a6340" stroke-opacity="0.35" stroke-width="3"></circle>

    
    <g filter="url(#glow)">
      <path d="M0 -150 L150 0 L0 150 L-150 0 Z" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linejoin="miter"></path>
      <path d="M0 -150 L150 0 L0 150 L-150 0 Z" fill="none" stroke="#3a2c18" stroke-opacity="0.6" stroke-width="2" stroke-linejoin="miter"></path>

      
      <circle r="56" fill="none" stroke="url(#gold)" stroke-width="14"></circle>

      
      <path d="M0 -118 L0 118 M-118 0 L118 0" fill="none" stroke="url(#gold)" stroke-width="14" stroke-linecap="butt"></path>

      
      <circle r="17" fill="url(#emberCore)"></circle>
    </g>

    
    <g fill="url(#bronze)">
      <circle cx="0" cy="-184" r="11"></circle>
      <circle cx="184" cy="0" r="11"></circle>
      <circle cx="0" cy="184" r="11"></circle>
      <circle cx="-184" cy="0" r="11"></circle>
    </g>
  </g>
</svg>